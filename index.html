<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MV Mexico Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; color: white; font-family: sans-serif; }
        #video { width: 100%; height: 100%; object-fit: contain; }
        #msg { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; font-size: 14px; opacity: 1; transition: opacity 2s; pointer-events: none; }
    </style>
</head>
<body>
    <video id="video" autoplay muted playsinline></video>
    <div id="msg">🔊 Presiona cualquier botón del control para activar sonido</div>

    <script>
        var video = document.getElementById('video');
        var msg = document.getElementById('msg');
        var videoSrc = "https://1601580044.rsc.cdn77.org/live/_jcn_/amls:Mariavision/playlist.m3u8";

        // Función para activar el sonido
        function activarSonido() {
            video.muted = false;
            msg.style.opacity = "0"; // Desvanece el mensaje
            console.log("Sonido activado por usuario");
        }

        // Escuchar cualquier tecla del control remoto (D-pad)
        window.addEventListener('keydown', activarSonido);
        // También por si acaso tocan el touch o click
        window.addEventListener('click', activarSonido);

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MV Player Pro</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; }
        .video-js { width: 100% !important; height: 100% !important; }
        #debug { position: absolute; top: 0; color: lime; z-index: 10; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>
    <div id="debug">Iniciando...</div>
    <video id="my-video" class="video-js vjs-default-skin" controls autoplay muted playsinline preload="auto">
        <source src="https://1601580044.rsc.cdn77.org/live/_jcn_/amls:Mariavision/playlist.m3u8" type="application/x-mpegURL">
    </video>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var player = videojs('my-video');
        var debug = document.getElementById('debug');

        player.on('ready', function() {
            debug.innerText = "Reproductor Listo";
            this.play().catch(function(error) {
                debug.innerText = "Error: Haz clic para reproducir";
                console.log("Autoplay bloqueado");
            });
        });

        player.on('error', function() {
            debug.innerText = "Error: El link del canal expiró o cambió.";
        });
    </script>
</body>
</html>
